server:
  port: ${PORT:5000}

spring:
  application:
    name: channel360-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/seed.sql
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5174}

  admin:
    email: ${ADMIN_EMAIL:niyajkumanali@gmail.com}
    password: ${ADMIN_PASSWORD:1234567890}
    first-name: ${ADMIN_FIRST_NAME:Niyaz}
    last-name: ${ADMIN_LAST_NAME:Kumanali}
    mobile-number: ${ADMIN_MOBILE:8217097121}
    skip: false

  super-admin:
    email: ${SUPER_ADMIN_EMAIL:iamniyazahmad777@gmail.com}
    password: ${SUPER_ADMIN_PASSWORD:1234567890}
    first-name: ${SUPER_ADMIN_FIRST_NAME:Niyaz}
    last-name: ${SUPER_ADMIN_LAST_NAME:Kumanali}
    mobile-number: ${SUPER_ADMIN_MOBILE:}
    skip: false

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_EXPIRATION:86400000}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}

cloudinary:
  url: ${CLOUDINARY_URL}

logging:
  level:
    com.channel360: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
